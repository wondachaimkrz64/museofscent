{% load static %}

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Muse Of Scent</title>

        <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />

        <script src="https://code.jquery.com/jquery-4.0.0.min.js" crossorigin="anonymous"></script>

        <!-- ✅ ADD THIS -->
        <style>
            html, body {
                height: 100%;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            .main-content {
                flex: 1;
            }
        </style>
    </head>

    <body>

        <div id="alert-container"
            class="position-fixed top-3 end-0 p-3"
            style="z-index: 1080;">
        </div>

        {% include 'navbar.html' %}

        <!-- ✅ WRAP CONTENT -->
        <div class="main-content">
            {% block content %}
            {% endblock %}
        </div>

        <!-- Footer-->
        <footer class="py-5 bg-dark gradient-background w-100 mt-auto">
            <div class="text-center text-white">
                <p class="m-0">Copyright &copy; Muse Of Scent 2026</p>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'js/scripts.js' %}"></script>

        <script>
          function showBootstrapAlert(message, type = "success") {
            const alertContainer = document.getElementById("alert-container");

            const alert = document.createElement("div");
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.role = "alert";

            alert.innerHTML = `
              ${message}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;

            alertContainer.appendChild(alert);

            setTimeout(() => {
              const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
              bsAlert.close();
            }, 3000);
          }
        </script>

        <script>
        document.addEventListener("DOMContentLoaded", function () {
          const params = new URLSearchParams(window.location.search);
          const auth = params.get("auth");

          const alerts = {
            login_success: { msg: "You’ve been logged in successfully!", type: "success" },
            login_error: { msg: "Invalid username or password.", type: "danger" },
            logout_success: { msg: "You’ve been logged out successfully.", type: "info" },
            register_success: { msg: "Account created successfully- Please fill out your user info below!", type: "success" },
            register_error: { msg: "Registration failed. Please check your details.", type: "danger" },
            category_error: { msg: "That category does not exist.", type: "warning" },
            profile_updated: { msg: "Your profile has been updated successfully.", type: "success" },
            info_updated: { msg: "Your info has been updated successfully.", type: "success" },
            login_required: { msg: "You must be logged in to access that page.", type: "warning" },
            password_updated: {
              msg: "Your password has been updated. Please log in again.",
              type: "success"
            },
            password_error: {
              msg: "Password update failed. Please check your input and try again.",
              type: "danger"
            },
            search_error: {
              msg: "That product does not exist...Try searching for something else!",
              type: "danger"
            },
            billing_error: {
              msg: "Access Denied!",
              type: "danger"
            },
            order_success: { msg: "Order Placed!", type: "success" },
            order_success2: { msg: "Shipping Status Updated", type: "success" },
          };

          if (auth && alerts[auth]) {
            showBootstrapAlert(alerts[auth].msg, alerts[auth].type);
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        });
        </script>

    </body>
</html>
